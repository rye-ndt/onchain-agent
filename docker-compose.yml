services:
  app:
    build: .
    env_file: .env
    environment:
      HTTP_API_PORT: "4000"
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/jarvis
      LOG_LEVEL: debug
      LOG_PRETTY: "false"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jarvis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Multi-replica profile: `docker compose --profile scale up --build`
  # Simulates the Cloud Run topology: 1 worker + 3 api replicas + nginx LB.
  worker:
    profiles: ["scale"]
    build: .
    env_file: .env
    environment:
      PROCESS_ROLE: worker
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/jarvis
      LOG_LEVEL: debug
      LOG_PRETTY: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  api:
    profiles: ["scale"]
    build: .
    env_file: .env
    environment:
      PROCESS_ROLE: http
      HTTP_API_PORT: "8080"
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/jarvis
      LOG_LEVEL: debug
      LOG_PRETTY: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      replicas: 3
    restart: unless-stopped

  lb:
    profiles: ["scale"]
    image: nginx:1.27-alpine
    ports:
      - "4000:80"
    volumes:
      - ./nginx.scale.conf:/etc/nginx/nginx.conf:ro
    depends_on: [api]
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
